name: Update results

on:
  schedule:
    - cron: "15,45 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest World Cup results
        run: python3 scripts/update.py

      - name: Commit if standings changed
        run: |
          if git diff --quiet data.json; then
            echo "No change"
            exit 0
          fi
          git config user.name "race-steward"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git commit -m "Results update $(date -u '+%Y-%m-%d %H:%M')"
          git push
